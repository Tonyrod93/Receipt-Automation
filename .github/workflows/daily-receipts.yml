name: Daily Outlook Receipts To Monday

on:
  schedule:
    # Permanent daily run. GitHub Actions schedules are UTC. 13:00 UTC is 8:00 AM Central during CDT.
    - cron: "0 13 * * *"
    # Temporary schedule test for July 9, 2026. Remove after confirming GitHub emits a scheduled run.
    - cron: "8 14 * * *"
  workflow_dispatch:

jobs:
  import-receipts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm install

      - name: Import receipts
        run: npm start
        env:
          MICROSOFT_TENANT_ID: ${{ secrets.MICROSOFT_TENANT_ID }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          MAILBOX_USER: ${{ secrets.MAILBOX_USER }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOOKBACK_DAYS: "7"
